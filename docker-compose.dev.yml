services:
  backend:
    build:
      context: .
      target: backend-dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - uv sync && uv run fastapi dev app/dev.py --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/root/.autopoe
      - .:/workspace
      - autopoe-dev-backend-venv:/workspace/.venv
      - autopoe-dev-uv-cache:/root/.cache/uv
    expose:
      - "8000"
    init: true

  frontend:
    build:
      context: .
      target: frontend-dev
    working_dir: /workspace/frontend
    command:
      - sh
      - -lc
      - pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0 --port 6873
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    volumes:
      - .:/workspace
      - autopoe-dev-frontend-node_modules:/workspace/frontend/node_modules
      - autopoe-dev-pnpm-store:/root/.local/share/pnpm/store
    ports:
      - 127.0.0.1:${AUTOPOE_DEV_FRONTEND_PORT:-6873}:6873
    depends_on:
      - backend
    init: true

volumes:
  autopoe-dev-backend-venv:
  autopoe-dev-frontend-node_modules:
  autopoe-dev-pnpm-store:
  autopoe-dev-uv-cache:
